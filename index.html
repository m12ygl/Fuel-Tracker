<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Fuel Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fuel">
<link rel="apple-touch-icon" href="icon-180-v2.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0b0d12; --panel:#101622; --border:#1e2330;
    --text:#f3f4f6; --body:#e8e8ea; --muted:#7d879b; --faint:#5b6272; --vfaint:#3a4150;
    --blue:#4d8dff; --pink:#ff5ea8;
  }
  *{box-sizing:border-box;}
  html,body{background:var(--bg);margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;color:var(--body);-webkit-tap-highlight-color:transparent;}
  button, input{font-family:inherit;}
  ::placeholder{color:var(--faint);}

  #app{min-height:100vh;background:var(--bg);}
  .main{padding:10px 20px 40px;max-width:520px;margin:0 auto;}

  .hdr{
    position:sticky;top:0;z-index:30;background:var(--bg);
    padding-top:calc(env(safe-area-inset-top,0px) + 14px);
    padding-bottom:10px;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .hdr .greeting{font-size:13px;color:var(--muted);}
  .hdr .headline{font-family:'Archivo',sans-serif;font-weight:900;font-size:26px;color:var(--text);letter-spacing:-0.5px;}
  .hdr .datesub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);font-weight:500;margin-top:2px;}
  .hdr-btns{display:flex;gap:6px;}
  .navbtn{width:34px;height:34px;border:1px solid var(--border);background:var(--panel);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;cursor:pointer;}
  .navbtn:disabled{opacity:0.35;cursor:default;}
  .calbtn{width:40px;height:40px;border-radius:11px;background:var(--panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}

  .calpop{position:absolute;top:72px;right:20px;z-index:35;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;width:260px;box-shadow:0 18px 40px rgba(0,0,0,0.5);}
  .calpop-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .calpop-hdr button{width:28px;height:28px;border:1px solid var(--border);background:var(--bg);border-radius:7px;color:var(--muted);cursor:pointer;}
  .calpop-hdr span{font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text);}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .calgrid .dow{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);text-align:center;padding-bottom:4px;}
  .calgrid .day{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;padding:7px 0;border-radius:7px;border:1px solid transparent;background:transparent;}
  .calgrid .day.today{border:1px solid #2e3a52;}
  .calgrid .day.sel{background:var(--blue);color:#0a0a0c;font-weight:700;}
  .calgrid .day.future{color:var(--vfaint);cursor:default;}
  .calgrid .day.clickable{cursor:pointer;color:var(--body);}

  .dial-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:16px;}
  .dial{position:relative;width:232px;height:232px;}
  .dial-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .dial-center .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--faint);font-weight:700;}
  .dial-center .num{font-family:'Archivo',sans-serif;font-weight:900;font-size:52px;line-height:0.9;letter-spacing:-2px;}
  .dial-center .unit{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);}
  .legend{display:flex;gap:22px;margin-top:6px;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-item .dot{width:9px;height:9px;border-radius:2px;}
  .legend-item span.txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;}
  .panel-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .panel-row:last-child{margin-bottom:0;}
  .panel-row label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);flex:1;}
  .panel-row input[type=number]{width:96px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:14px;}
  .btn-primary{background:var(--blue);border:none;color:#0a0a0c;font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;padding:11px;border-radius:10px;cursor:pointer;width:100%;}

  .coach{background:linear-gradient(135deg,#0e1626,#0d1018);border:1px solid #1c3050;border-radius:18px;padding:16px;margin-bottom:12px;}
  .coach-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .coach-hdr-left{display:flex;align-items:center;gap:8px;}
  .coach-badge{width:22px;height:22px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#0a0a0c;font-family:'Archivo';font-weight:900;font-size:13px;}
  .coach-hdr-left span{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--blue);font-weight:700;}
  .coach-settings-btn{background:none;border:none;color:var(--faint);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;}
  .coach-settings-panel{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:12px;}
  .coach-settings-panel label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;}
  .coach-settings-panel .row{display:flex;gap:8px;}
  .coach-settings-panel input[type=text]{flex:1;min-width:0;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:12px;}
  .coach-settings-panel button{background:var(--blue);border:none;color:#0a0a0c;font-weight:800;font-size:11px;text-transform:uppercase;padding:0 12px;border-radius:8px;cursor:pointer;}
  .chatlist{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-bottom:12px;}
  .chat-user{align-self:flex-end;background:var(--panel);border:1px solid var(--border);color:var(--body);padding:9px 12px;border-radius:12px;font-size:13.5px;line-height:1.45;max-width:88%;white-space:pre-wrap;}
  .chat-ai{align-self:flex-start;background:#0e1626;border:1px solid #1c3050;color:#d4d8e0;padding:9px 12px;border-radius:12px;font-size:13.5px;line-height:1.45;max-width:88%;white-space:pre-wrap;}
  .chat-loading{align-self:flex-start;color:var(--faint);font-style:italic;font-size:13.5px;padding:4px 2px;}
  .chat-hint{font-size:14px;line-height:1.5;color:#d4d8e0;margin-bottom:12px;}
  .coach-input-row{display:flex;gap:8px;}
  .coach-input-row input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--text);}
  .coach-send{width:44px;background:var(--blue);border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#0a0a0c;font-family:'Archivo';font-weight:900;font-size:18px;cursor:pointer;flex-shrink:0;}
  .coach-send:disabled{opacity:0.5;}

  .addfood{position:relative;}
  .addfood .namewrap{position:relative;margin-bottom:8px;}
  .addfood input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px 13px;font-size:14px;}
  .suggestbox{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:20;max-height:180px;overflow-y:auto;}
  .suggest-item{display:flex;justify-content:space-between;padding:9px 12px;cursor:pointer;font-size:13px;color:var(--body);border-bottom:1px solid #1a2030;}
  .suggest-item span.macro{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;}
  .addfood-row{display:flex;gap:8px;}
  .addfood-row input[type=number]{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px 13px;font-size:14px;}
  .addfood-row button{background:var(--blue);border:none;color:#0a0a0c;font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;padding:0 16px;border-radius:9px;cursor:pointer;}

  .actionrow{display:flex;gap:8px;margin-bottom:16px;}
  .btn-log{flex:1;background:var(--blue);border:none;border-radius:12px;padding:13px;text-align:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:0.5px;color:#0a0a0c;text-transform:uppercase;cursor:pointer;}
  .btn-gear{width:52px;background:var(--panel);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;cursor:pointer;}

  .entries-hdr{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--faint);font-weight:700;padding:0 2px 8px;}
  .entry-row{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-top:1px solid #1a2030;}
  .entry-row .name{font-size:14px;color:var(--body);flex:1;}
  .entry-row .macro{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-right:10px;}
  .entry-row .del{background:none;border:none;color:var(--vfaint);font-size:16px;width:22px;height:22px;line-height:1;cursor:pointer;}
  .empty-state{text-align:center;color:var(--faint);font-size:13px;padding:22px 0;}
  .cleardayrow{display:flex;justify-content:center;margin-top:14px;}
  .cleardayrow button{background:none;border:none;color:var(--faint);font-size:12px;font-family:'Inter';cursor:pointer;padding:6px;}
  .datarow{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:4px;}
  .datarow button{background:none;border:none;color:var(--faint);font-size:12px;font-family:'Inter';cursor:pointer;padding:6px;text-decoration:underline;}
  .datarow .sep{color:var(--vfaint);font-size:12px;}
</style>
</head>
<body>
<div id="app"><div class="main" id="main">Loading…</div></div>

<script>
(function(){
  // ---------- storage ----------
  const TARGETS_KEY = 'fuel-targets';
  const LIBRARY_KEY = 'fuel-food-library';
  const WORKER_URL_KEY = 'fuel-ai-worker-url';
  const entryKey = (k) => 'fuel-entries:'+k;

  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
  function lsRemove(k){ try{ localStorage.removeItem(k); }catch(e){} }

  // ---------- date helpers ----------
  function keyOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function parseKey(k){ const [y,m,dd]=k.split('-').map(Number); return new Date(y, m-1, dd); }
  function todayKey(){ return keyOf(new Date()); }

  // ---------- state ----------
  const state = {
    ready:false,
    targets:{ calories:1800, protein:150 },
    entries:[],
    library:{},
    loggedDates:[],
    viewKey:null,
    calMonth:null,
    showCal:false,
    showTargets:false,
    addOpen:false,
    suggestions:[],
    chat:[],
    asking:false,
    showAiSettings:false,
    workerUrl: lsGet(WORKER_URL_KEY) || ''
  };

  function loadEntries(k){
    const raw = lsGet(entryKey(k));
    if(raw){ try{ return JSON.parse(raw); }catch(e){} }
    return [];
  }
  function scanLoggedDates(){
    const out = [];
    try{
      for(let i=0;i<localStorage.length;i++){
        const key = localStorage.key(i);
        if(key && key.indexOf('fuel-entries:')===0){ out.push(key.replace('fuel-entries:','')); }
      }
    }catch(e){}
    return out;
  }
  function persistEntries(entries){
    const k = state.viewKey;
    if(entries.length){ lsSet(entryKey(k), JSON.stringify(entries)); }
    else { lsRemove(entryKey(k)); }
    state.entries = entries;
    state.loggedDates = scanLoggedDates();
    render();
  }
  function persistTargets(targets){ lsSet(TARGETS_KEY, JSON.stringify(targets)); state.targets = targets; }
  function rememberFood(name, cal, pro){
    const library = { ...state.library };
    library[name.toLowerCase()] = { name, cal, pro };
    lsSet(LIBRARY_KEY, JSON.stringify(library));
    state.library = library;
  }

  // ---------- init ----------
  function init(){
    let targets = { calories:1800, protein:150 };
    const tRaw = lsGet(TARGETS_KEY);
    if(tRaw){ try{ targets = JSON.parse(tRaw); }catch(e){} }
    let library = {};
    const lRaw = lsGet(LIBRARY_KEY);
    if(lRaw){ try{ library = JSON.parse(lRaw); }catch(e){} }
    const viewKey = todayKey();
    const now = new Date();
    state.ready = true;
    state.targets = targets;
    state.library = library;
    state.viewKey = viewKey;
    state.calMonth = { y: now.getFullYear(), m: now.getMonth() };
    state.entries = loadEntries(viewKey);
    state.loggedDates = scanLoggedDates();
    render();
  }

  // ---------- day nav ----------
  function goDay(delta){
    const d = parseKey(state.viewKey);
    d.setDate(d.getDate()+delta);
    const k = keyOf(d);
    if(k > todayKey()) return;
    state.viewKey = k;
    state.entries = loadEntries(k);
    state.calMonth = { y:d.getFullYear(), m:d.getMonth() };
    state.showCal = false;
    render();
  }
  function pickDay(k){
    const d = parseKey(k);
    state.viewKey = k;
    state.entries = loadEntries(k);
    state.showCal = false;
    state.calMonth = { y:d.getFullYear(), m:d.getMonth() };
    render();
  }

  // ---------- totals ----------
  function totals(){
    const c = state.entries.reduce((s,e)=>s+Number(e.cal||0),0);
    const p = state.entries.reduce((s,e)=>s+Number(e.pro||0),0);
    return { c, p };
  }

  // ---------- add food ----------
  function submitAdd(){
    const nameEl = document.getElementById('ft-name');
    const calEl = document.getElementById('ft-cal');
    const proEl = document.getElementById('ft-pro');
    const name = (nameEl && nameEl.value || '').trim();
    const cal = Number(calEl && calEl.value);
    const pro = Number(proEl && proEl.value) || 0;
    if(!name || !cal) return;
    const entry = { id: Date.now()+'-'+Math.random().toString(36).slice(2), name, cal, pro };
    rememberFood(name, cal, pro);
    persistEntries([...state.entries, entry]);
    state.suggestions = [];
    render();
    const freshNameEl = document.getElementById('ft-name');
    if(freshNameEl) freshNameEl.focus();
  }
  function nameInput(e){
    const q = (e.target.value||'').trim().toLowerCase();
    if(!q){ state.suggestions = []; render(); return; }
    const matches = Object.values(state.library).filter(f=>f.name.toLowerCase().includes(q)).slice(0,6);
    state.suggestions = matches;
    render();
  }
  function fillSuggestion(f){
    state.suggestions = [];
    render();
    const nameEl = document.getElementById('ft-name');
    const calEl = document.getElementById('ft-cal');
    const proEl = document.getElementById('ft-pro');
    if(nameEl) nameEl.value = f.name;
    if(calEl) calEl.value = f.cal;
    if(proEl) proEl.value = f.pro;
    if(calEl) calEl.focus();
  }

  // ---------- targets ----------
  function toggleTargets(){
    state.showTargets = !state.showTargets;
    render();
    if(state.showTargets){
      const tc=document.getElementById('ft-tcal'), tp=document.getElementById('ft-tpro');
      if(tc) tc.value=state.targets.calories;
      if(tp) tp.value=state.targets.protein;
    }
  }
  function saveTargets(){
    const tc = document.getElementById('ft-tcal'), tp = document.getElementById('ft-tpro');
    const cal = Number(tc && tc.value) || state.targets.calories;
    const pro = Number(tp && tp.value) || state.targets.protein;
    persistTargets({ calories: cal, protein: pro });
    state.showTargets = false;
    render();
  }

  // ---------- coach / AI ----------
  function buildSystem(){
    const {c,p} = totals();
    const t = state.targets;
    const remC = Math.max(0, t.calories - c), remP = Math.max(0, t.protein - p);
    const logged = state.entries.length ? state.entries.map(e=>`${e.name} (${Math.round(e.cal)} kcal, ${Math.round(e.pro)}g)`).join('; ') : 'nothing yet';
    const common = Object.values(state.library).slice(0,20).map(f=>`${f.name} (${Math.round(f.cal)} kcal, ${Math.round(f.pro)}g)`).join('; ');
    return `You are a blunt, practical nutrition coach inside a calorie/protein tracker. Keep answers to 2-4 sentences, specific and actionable — no fluff, no medical disclaimers. This person is on a cutting phase.\nDay: ${state.viewKey}\nDaily target: ${t.calories} kcal, ${t.protein}g protein\nEaten: ${Math.round(c)} kcal, ${Math.round(p)}g protein\nRemaining: ${Math.round(remC)} kcal, ${Math.round(remP)}g protein\nLogged today: ${logged}\nRegular foods: ${common || 'none saved'}\nIf asked what to eat, give 1-2 concrete options that fit the remaining budget, ideally from their regular foods.`;
  }
  async function ask(){
    const input = document.getElementById('ft-coach');
    const q = (input && input.value || '').trim();
    if(!q || state.asking) return;
    if(!state.workerUrl){
      state.chat = [...state.chat, {role:'user', text:q}, {role:'ai', text:"No Worker URL set yet — tap Settings above and paste in your Cloudflare Worker URL first."}];
      if(input) input.value = '';
      render();
      return;
    }
    if(input) input.value = '';
    state.chat = [...state.chat, {role:'user', text:q}, {role:'loading', text:'Thinking…'}];
    state.asking = true;
    render();
    let answer = "Couldn't reach the coach just now — try again in a moment.";
    try{
      const response = await fetch(state.workerUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-5',
          max_tokens: 1000,
          system: buildSystem(),
          messages: [{ role:'user', content:q }]
        })
      });
      const data = await response.json();
      if(data.error){
        answer = "API error: " + (data.error.message || JSON.stringify(data.error));
      } else {
        const textBlocks = (data.content || []).filter(b=>b.type==='text').map(b=>b.text);
        answer = textBlocks.join('\n').trim() || "Got an empty response — try rephrasing.";
      }
    }catch(e){
      answer = "Couldn't reach the Worker — check the URL in Settings and your connection.";
    }
    const base = state.chat.filter(m=>m.role!=='loading');
    state.chat = [...base, {role:'ai', text:answer}];
    state.asking = false;
    render();
  }
  function toggleAiSettings(){
    state.showAiSettings = !state.showAiSettings;
    render();
    if(state.showAiSettings){
      const el = document.getElementById('ft-worker-url');
      if(el) el.value = state.workerUrl;
    }
  }
  function saveAiSettings(){
    const el = document.getElementById('ft-worker-url');
    state.workerUrl = (el && el.value || '').trim();
    lsSet(WORKER_URL_KEY, state.workerUrl);
    state.showAiSettings = false;
    render();
  }

  // ---------- calendar grid ----------
  function buildCalDays(){
    const {y,m} = state.calMonth;
    const first = new Date(y,m,1);
    const startOffset = first.getDay();
    const days = new Date(y,m+1,0).getDate();
    const todayK = todayKey();
    const logged = new Set(state.loggedDates);
    const cells = [];
    for(let i=0;i<startOffset;i++){ cells.push({ empty:true, key:'e'+i }); }
    for(let d=1; d<=days; d++){
      const dd = new Date(y,m,d);
      const k = keyOf(dd);
      const isFuture = k > todayK;
      const isSel = k === state.viewKey;
      const isToday = k === todayK;
      cells.push({ empty:false, key:k, label:String(d), isFuture, isSel, isToday, clickable: !isFuture });
    }
    return cells;
  }

  // ---------- escaping ----------
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ---------- render ----------
  function render(){
    const mainEl = document.getElementById('main');

    // capture focus state to restore after innerHTML rebuild
    const active = document.activeElement;
    const activeId = active && active.id;
    const activeValue = active && 'value' in active ? active.value : null;
    const selStart = active && active.selectionStart;
    const selEnd = active && active.selectionEnd;

    mainEl.innerHTML = buildHTML();

    if(activeId){
      const el = document.getElementById(activeId);
      if(el){
        el.focus();
        if(typeof activeValue === 'string') el.value = activeValue;
        if(selStart != null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} }
      }
    }
  }

  function buildHTML(){
    if(!state.ready){
      return `<div class="empty-state">Loading your day…</div>`;
    }

    const { c, p } = totals();
    const t = state.targets;
    const remC = t.calories - c, remP = t.protein - p;
    const calPct = Math.max(0, Math.min(1, c / t.calories));
    const proPct = Math.max(0, Math.min(1, p / t.protein));
    const over = remC < 0;

    const now = new Date();
    const h = now.getHours();
    const greeting = (h<12? 'Good morning' : h<18? 'Good afternoon' : 'Good evening') + ' \u{1F44B}';
    const vd = parseKey(state.viewKey);
    const isToday = state.viewKey === todayKey();
    const y2 = new Date(); y2.setDate(y2.getDate()-1);
    const headline = isToday ? "TODAY'S FUEL" : (state.viewKey===keyOf(y2) ? "YESTERDAY" : vd.toLocaleDateString(undefined,{weekday:'long'}).toUpperCase());
    const dow3 = vd.toLocaleDateString(undefined,{weekday:'short'}).toUpperCase();
    const dateSub = state.viewKey + ' \u00B7 ' + dow3;

    const centerNum = Math.round(Math.abs(remC));
    const centerLabel = over ? 'OVER' : 'REMAINING';
    const centerColor = over ? 'var(--pink)' : 'var(--text)';
    const calRingColor = over ? 'var(--pink)' : 'var(--blue)';
    const calOffset = (628.3 * (1 - calPct)).toFixed(1);
    const proOffset = (490.1 * (1 - proPct)).toFixed(1);

    const calMonthLabel = new Date(state.calMonth.y, state.calMonth.m, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
    const calDays = buildCalDays();
    const dow = ['S','M','T','W','T','F','S'];

    let html = '';

    // header
    html += `<div class="hdr">
      <div>
        <div class="greeting">${esc(greeting)}</div>
        <div class="headline">${esc(headline)}</div>
        <div class="datesub">${esc(dateSub)}</div>
      </div>
      <div class="hdr-btns">
        <button class="navbtn" onclick="App.goDay(-1)">\u2039</button>
        <button class="calbtn" onclick="App.toggleCal()">\u{1F4C5}</button>
        <button class="navbtn" ${isToday?'disabled':''} onclick="App.goDay(1)">\u203A</button>
      </div>`;

    if(state.showCal){
      html += `<div class="calpop">
        <div class="calpop-hdr">
          <button onclick="App.calPrev()">\u2039</button>
          <span>${esc(calMonthLabel)}</span>
          <button onclick="App.calNext()">\u203A</button>
        </div>
        <div class="calgrid">`;
      dow.forEach(d => { html += `<div class="dow">${d}</div>`; });
      calDays.forEach(d => {
        if(d.empty){ html += `<div></div>`; return; }
        let cls = 'day';
        if(d.isToday) cls += ' today';
        if(d.isSel) cls += ' sel';
        if(d.isFuture) cls += ' future'; else if(!d.isSel) cls += ' clickable';
        const onclick = (!d.isFuture) ? `onclick="App.pickDay('${d.key}')"` : '';
        html += `<div class="${cls}" ${onclick}>${d.label}</div>`;
      });
      html += `</div></div>`;
    }
    html += `</div>`; // .hdr

    // dial hero
    html += `<div class="dial-wrap">
      <div class="dial">
        <svg width="232" height="232" viewBox="0 0 232 232" style="transform:rotate(-90deg);">
          <circle cx="116" cy="116" r="100" fill="none" stroke="#12203a" stroke-width="16"/>
          <circle cx="116" cy="116" r="100" fill="none" stroke="${calRingColor}" stroke-width="16" stroke-linecap="round" stroke-dasharray="628.3" stroke-dashoffset="${calOffset}"/>
          <circle cx="116" cy="116" r="78" fill="none" stroke="#331229" stroke-width="12"/>
          <circle cx="116" cy="116" r="78" fill="none" stroke="var(--pink)" stroke-width="12" stroke-linecap="round" stroke-dasharray="490.1" stroke-dashoffset="${proOffset}"/>
        </svg>
        <div class="dial-center">
          <div class="lbl">${centerLabel}</div>
          <div class="num" style="color:${centerColor};">${centerNum}</div>
          <div class="unit">kcal</div>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--blue);"></span><span class="txt">${Math.round(c)} / ${t.calories}</span></div>
        <div class="legend-item"><span class="dot" style="background:var(--pink);"></span><span class="txt">${Math.round(p)} / ${t.protein}g pro</span></div>
      </div>
    </div>`;

    // targets panel
    if(state.showTargets){
      html += `<div class="panel">
        <div class="panel-row"><label>CAL TARGET</label><input id="ft-tcal" type="number"></div>
        <div class="panel-row"><label>PROTEIN TARGET</label><input id="ft-tpro" type="number"></div>
        <button class="btn-primary" onclick="App.saveTargets()">Save targets</button>
      </div>`;
    }

    // coach panel
    html += `<div class="coach">
      <div class="coach-hdr">
        <div class="coach-hdr-left"><div class="coach-badge">C</div><span>COACH</span></div>
        <button class="coach-settings-btn" onclick="App.toggleAiSettings()">Settings</button>
      </div>`;
    if(state.showAiSettings){
      html += `<div class="coach-settings-panel">
        <label>Worker URL (from your Cloudflare Worker deploy)</label>
        <div class="row">
          <input type="text" id="ft-worker-url" placeholder="https://your-worker.your-name.workers.dev">
          <button onclick="App.saveAiSettings()">Save</button>
        </div>
      </div>`;
    }
    if(state.chat.length){
      html += `<div class="chatlist">`;
      state.chat.forEach(m => {
        const cls = m.role==='user' ? 'chat-user' : m.role==='loading' ? 'chat-loading' : 'chat-ai';
        html += `<div class="${cls}">${esc(m.text)}</div>`;
      });
      html += `</div>`;
    } else {
      const hint = `You've got ${Math.round(Math.max(0,remC))} kcal and ${Math.round(Math.max(0,remP))}g protein left. Ask me what to eat, or whether you can fit something in.`;
      html += `<div class="chat-hint">${esc(hint)}</div>`;
    }
    html += `<div class="coach-input-row">
        <input type="text" id="ft-coach" placeholder="Ask about today…" onkeydown="if(event.key==='Enter')App.ask()">
        <button class="coach-send" ${state.asking?'disabled':''} onclick="App.ask()">\u2192</button>
      </div>
    </div>`;

    // add food panel
    if(state.addOpen){
      html += `<div class="panel addfood">
        <div class="namewrap">
          <input type="text" id="ft-name" autocomplete="off" placeholder="Food name" oninput="App.nameInput(event)">`;
      if(state.suggestions.length){
        html += `<div class="suggestbox">`;
        state.suggestions.forEach((f,i) => {
          html += `<div class="suggest-item" onclick="App.fillSuggestion(${i})"><span>${esc(f.name)}</span><span class="macro">${Math.round(f.cal)} / ${Math.round(f.pro)}g</span></div>`;
        });
        html += `</div>`;
      }
      html += `</div>
        <div class="addfood-row">
          <input type="number" id="ft-cal" placeholder="kcal">
          <input type="number" id="ft-pro" placeholder="protein g">
          <button onclick="App.submitAdd()">Add</button>
        </div>
      </div>`;
    }

    // action row
    html += `<div class="actionrow">
      <button class="btn-log" onclick="App.toggleAdd()">${state.addOpen ? 'CLOSE' : '+ LOG FOOD'}</button>
      <button class="btn-gear" onclick="App.toggleTargets()">\u2699</button>
    </div>`;

    // entries
    html += `<div class="entries-hdr"><span>LOGGED \u00B7 ${state.entries.length}</span><span>KCAL / PRO</span></div>`;
    if(state.entries.length){
      html += `<div>`;
      state.entries.forEach(e => {
        html += `<div class="entry-row">
          <span class="name">${esc(e.name)}</span>
          <span class="macro">${Math.round(e.cal)} / ${Math.round(e.pro)}g</span>
          <button class="del" onclick="App.deleteEntry('${e.id}')">\u00D7</button>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="empty-state">Nothing logged yet \u2014 tap Log food to start.</div>`;
    }

    html += `<div class="cleardayrow"><button onclick="App.clearDay()">Clear this day</button></div>`;
    html += `<div class="datarow">
      <button onclick="App.exportData()">Export data</button>
      <span class="sep">\u00B7</span>
      <button onclick="App.triggerImport()">Import data</button>
    </div>
    <input type="file" id="ft-import-file" accept="application/json" style="display:none">`;

    return html;
  }

  // ---------- export / import ----------
  function exportData(){
    const data = {};
    try{
      for(let i=0;i<localStorage.length;i++){
        const key = localStorage.key(i);
        if(key && key.indexOf('fuel-')===0){
          data[key] = localStorage.getItem(key);
        }
      }
    }catch(e){}
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'fuel-tracker-backup-' + todayKey() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  function triggerImport(){
    const input = document.getElementById('ft-import-file');
    if(!input) return;
    input.value = '';
    input.onchange = () => {
      const file = input.files && input.files[0];
      if(file) importDataFile(file);
    };
    input.click();
  }
  function importDataFile(file){
    const reader = new FileReader();
    reader.onload = () => {
      let data;
      try{ data = JSON.parse(reader.result); }
      catch(e){ alert('Import failed: that file is not valid JSON.'); return; }
      if(!data || typeof data !== 'object'){ alert('Import failed: unexpected file format.'); return; }
      const keys = Object.keys(data).filter(k => k.indexOf('fuel-')===0);
      if(!keys.length){ alert('Import failed: no Fuel Tracker data found in that file.'); return; }
      if(!confirm('This will overwrite your current entries, targets, and food library with the contents of this backup. Continue?')) return;
      keys.forEach(k => lsSet(k, data[k]));
      init();
      alert('Import complete \u2014 your data has been restored.');
    };
    reader.onerror = () => alert('Import failed: could not read that file.');
    reader.readAsText(file);
  }

  // ---------- public API (used by inline onclick handlers) ----------
  window.App = {
    goDay, pickDay,
    toggleCal(){ state.showCal = !state.showCal; render(); },
    calPrev(){ const m=state.calMonth.m-1; const d=new Date(state.calMonth.y, m, 1); state.calMonth={y:d.getFullYear(), m:d.getMonth()}; render(); },
    calNext(){ const m=state.calMonth.m+1; const d=new Date(state.calMonth.y, m, 1); state.calMonth={y:d.getFullYear(), m:d.getMonth()}; render(); },
    toggleTargets, saveTargets,
    toggleAiSettings, saveAiSettings,
    toggleAdd(){ state.addOpen = !state.addOpen; state.suggestions = []; render(); },
    submitAdd, nameInput,
    fillSuggestion(i){ fillSuggestion(state.suggestions[i]); },
    ask,
    deleteEntry(id){ persistEntries(state.entries.filter(x=>x.id!==id)); },
    clearDay(){ persistEntries([]); },
    exportData, triggerImport
  };

  init();
})();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('SW registration failed', e));
  });
}
</script>
</body>
</html>
